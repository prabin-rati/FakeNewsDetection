<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Login - AI Detector</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen p-4">

    <div class="glass-card w-full max-w-md p-10 rounded-3xl animate-slide-up border-t-8 border-blue-600 shadow-2xl">
        
        <div class="text-center mb-10">
            <div class="inline-flex items-center justify-center w-16 h-16 bg-blue-100 text-blue-600 rounded-2xl mb-4">
                <i class="fa-solid fa-user-shield text-3xl"></i>
            </div>
            <h2 class="text-3xl font-black text-gray-900 tracking-tight">Welcome Back</h2>
            <p class="text-gray-500 font-medium">Log in to verify your news articles</p>
        </div>

        {% with messages = get_flashed_messages() %}
          {% if messages %}
            {% for message in messages %}
              <div class="bg-red-50 border-l-4 border-red-500 text-red-700 p-4 mb-6 rounded-lg text-sm font-bold flex items-center">
                <i class="fa-solid fa-circle-exclamation mr-2"></i>
                {{ message }}
              </div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <form action="/login" method="POST" class="space-y-6">
            <div>
                <label class="block text-xs font-black text-gray-400 uppercase tracking-widest mb-2">Username</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 pl-4 flex items-center text-gray-400">
                        <i class="fa-solid fa-at"></i>
                    </span>
                    <input type="text" name="username" required 
                           class="w-full pl-11 pr-4 py-4 bg-gray-50 border-2 border-gray-100 rounded-2xl focus:bg-white focus:border-blue-500 focus:ring-4 focus:ring-blue-50 outline-none transition-all duration-300" 
                           placeholder="Enter your username">
                </div>
            </div>

            <div>
                <label class="block text-xs font-black text-gray-400 uppercase tracking-widest mb-2">Password</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 pl-4 flex items-center text-gray-400">
                        <i class="fa-solid fa-lock"></i>
                    </span>
                    <input type="password" name="password" required 
                           class="w-full pl-11 pr-4 py-4 bg-gray-50 border-2 border-gray-100 rounded-2xl focus:bg-white focus:border-blue-500 focus:ring-4 focus:ring-blue-50 outline-none transition-all duration-300" 
                           placeholder="••••••••">
                </div>
            </div>

            <button type="submit" 
                    class="btn-primary-glow w-full bg-blue-600 text-white font-black py-4 rounded-2xl shadow-xl hover:bg-blue-700 transition-all flex items-center justify-center">
                SIGN IN <i class="fa-solid fa-arrow-right ml-2"></i>
            </button>
        </form>

        <div class="mt-10 pt-6 border-t border-gray-100 text-center">
            <p class="text-sm text-gray-500 font-medium">
                New to the system? 
                <a href="{{ url_for('signup') }}" class="text-blue-600 font-bold hover:underline">Create an account</a>
            </p>
        </div>
    </div>

</body>
</html>
